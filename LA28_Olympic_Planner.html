<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LA28 Olympic Games — Group Ticket Planner</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f4f8; color: #1a202c; }

/* ── Header ── */
header {
  background: linear-gradient(135deg, #002633 0%, #003d52 60%, #005f80 100%);
  color: #fff; padding: 14px 22px; display: flex; align-items: center; gap: 16px;
  box-shadow: 0 3px 12px rgba(0,0,0,.3); flex-wrap: wrap;
}
.logo { font-size: 24px; font-weight: 900; letter-spacing: -1px; line-height: 1; }
.logo span { color: #4fc3f7; }
.logo-sub { font-size: 11px; color: #a0cfe0; margin-top: 3px; }
header .spacer { flex: 1; }
.tab-nav { display: flex; gap: 5px; }
.tab-btn { padding: 7px 13px; border-radius: 6px; border: none; cursor: pointer; font-size: 12px; font-weight: 600; transition: all .15s; background: rgba(255,255,255,.12); color: #d0eaf7; }
.tab-btn.active { background: #4fc3f7; color: #002633; }
.tab-btn:hover:not(.active) { background: rgba(255,255,255,.22); }

/* sync pill in header */
.sync-pill { display: flex; align-items: center; gap: 5px; font-size: 11px; padding: 4px 10px; border-radius: 20px; font-weight: 600; }
.sync-pill.connected    { background: rgba(72,187,120,.2); color: #c6f6d5; }
.sync-pill.syncing      { background: rgba(246,173,85,.2);  color: #feebc8; }
.sync-pill.disconnected { background: rgba(252,129,129,.2); color: #fed7d7; }
.sync-dot { width: 7px; height: 7px; border-radius: 50%; }
.sync-pill.connected .sync-dot    { background: #48BB78; }
.sync-pill.syncing .sync-dot      { background: #F6AD55; animation: pulse 1s infinite; }
.sync-pill.disconnected .sync-dot { background: #FC8181; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* share bar */
.share-bar { background: #e6f7ff; border-bottom: 1px solid #bee3f8; padding: 8px 22px; display: flex; align-items: center; gap: 10px; font-size: 12px; }
.share-url { flex: 1; font-family: monospace; font-size: 11px; background: #fff; border: 1px solid #bee3f8; border-radius: 5px; padding: 4px 8px; color: #2b6cb0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.share-copy-btn { background: #003d52; color: #fff; border: none; border-radius: 5px; padding: 5px 12px; font-size: 11px; font-weight: 700; cursor: pointer; white-space: nowrap; }
.share-copy-btn:hover { background: #005f80; }
.share-copy-btn.copied { background: #38a169; }

/* ── Setup overlay ── */
.setup-overlay { position: fixed; inset: 0; background: rgba(0,38,51,.85); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
.setup-card { background: #fff; border-radius: 16px; padding: 36px 40px; max-width: 500px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,.4); }
.setup-logo { font-size: 28px; font-weight: 900; color: #002633; margin-bottom: 6px; }
.setup-logo span { color: #4fc3f7; }
.setup-card h2 { font-size: 18px; color: #1a202c; margin-bottom: 6px; }
.setup-card p  { font-size: 13px; color: #718096; line-height: 1.6; margin-bottom: 20px; }
.setup-steps { background: #f7fafc; border-radius: 8px; padding: 14px 16px; margin-bottom: 20px; font-size: 12px; color: #4a5568; line-height: 1.9; }
.setup-steps a { color: #3182ce; }
.setup-steps code { background: #e2e8f0; padding: 1px 5px; border-radius: 3px; font-size: 11px; }
.setup-input-label { font-size: 11px; font-weight: 700; color: #718096; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 5px; display: block; }
.setup-input { width: 100%; border: 1.5px solid #e2e8f0; border-radius: 8px; padding: 9px 12px; font-size: 13px; outline: none; margin-bottom: 12px; font-family: monospace; }
.setup-input:focus { border-color: #4fc3f7; }
.setup-input.error { border-color: #FC8181; }
.setup-error { font-size: 12px; color: #e53e3e; margin-bottom: 10px; }
.setup-btn { width: 100%; background: #003d52; color: #fff; border: none; border-radius: 8px; padding: 11px; font-size: 14px; font-weight: 700; cursor: pointer; }
.setup-btn:hover { background: #005f80; }
.setup-btn:disabled { background: #a0aec0; cursor: not-allowed; }
.setup-or { text-align: center; font-size: 12px; color: #a0aec0; margin: 14px 0; }
.setup-btn-secondary { width: 100%; background: #edf2f7; color: #4a5568; border: none; border-radius: 8px; padding: 9px; font-size: 13px; font-weight: 600; cursor: pointer; }
.setup-btn-secondary:hover { background: #e2e8f0; }

/* ── Layout ── */
.app { display: flex; min-height: calc(100vh - 68px); }
.sidebar { width: 240px; min-width: 240px; background: #fff; border-right: 1px solid #e2e8f0; padding: 16px 14px; display: flex; flex-direction: column; gap: 18px; overflow-y: auto; }
.main { flex: 1; padding: 18px 20px; overflow-y: auto; max-height: calc(100vh - 68px); }

.sidebar-section h3 { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: #718096; font-weight: 700; margin-bottom: 8px; }
.friend-pill { display: flex; align-items: center; gap: 7px; padding: 6px 8px; border-radius: 7px; cursor: pointer; transition: background .12s; user-select: none; }
.friend-pill:hover { background: #f7fafc; }
.friend-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
.friend-name { font-size: 13px; font-weight: 500; flex: 1; }
.friend-count { font-size: 10px; background: #e2e8f0; border-radius: 10px; padding: 1px 6px; color: #4a5568; font-weight: 600; }
.remove-friend { font-size: 10px; color: #a0aec0; cursor: pointer; padding: 1px 4px; border-radius: 3px; }
.remove-friend:hover { color: #e53e3e; background: #fff5f5; }
.add-friend-row { display: flex; gap: 5px; margin-top: 4px; }
.add-friend-row input { flex: 1; border: 1px solid #e2e8f0; border-radius: 6px; padding: 5px 8px; font-size: 12px; outline: none; }
.add-friend-row input:focus { border-color: #4fc3f7; }
.add-friend-row button { background: #003d52; color: #fff; border: none; border-radius: 6px; padding: 5px 10px; font-size: 13px; cursor: pointer; font-weight: 700; }
.add-friend-row button:hover { background: #005f80; }

.filter-bar { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; align-items: flex-end; }
.filter-group { display: flex; flex-direction: column; gap: 3px; }
.filter-group label { font-size: 10px; color: #718096; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; }
.filter-group select, .filter-group input[type=text] { border: 1px solid #e2e8f0; border-radius: 6px; padding: 5px 8px; font-size: 12px; outline: none; background: #fff; }
.filter-group select:focus, .filter-group input[type=text]:focus { border-color: #4fc3f7; }
.result-count { margin-left: auto; font-size: 12px; color: #718096; align-self: center; }

/* ── Cards ── */
.events-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px,1fr)); gap: 12px; }
.event-card { background: #fff; border-radius: 10px; border: 1.5px solid #e2e8f0; padding: 12px 14px; transition: box-shadow .15s, border-color .15s; }
.event-card.has-interest  { border-color: #90cdf4; background: #f0faff; }
.event-card.has-veto      { border-color: #FC8181; background: #fff5f5; }
.event-card.has-conflict  { border-color: #F6AD55; background: #fffaf0; }
.event-card:hover { box-shadow: 0 3px 14px rgba(0,0,0,.09); border-color: #bee3f8; }

.card-header { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 7px; }
.sport-icon { font-size: 20px; flex-shrink: 0; margin-top: 1px; }
.card-title-block { flex: 1; min-width: 0; }
.card-sport { font-size: 14px; font-weight: 700; }
.card-sport-sub { font-size: 11px; color: #718096; margin-top: 1px; }
.card-datetime { font-size: 11px; color: #718096; margin-top: 2px; }
.type-badge-final  { background: linear-gradient(135deg,#ffd700,#f6ad55); color: #7b3f00; font-size: 10px; font-weight: 800; padding: 2px 7px; border-radius: 8px; white-space: nowrap; flex-shrink: 0; }
.type-badge-prelim { background: #e6f7ff; color: #0369a1; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 8px; white-space: nowrap; flex-shrink: 0; }

.card-desc { font-size: 11px; color: #4a5568; margin-bottom: 7px; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.card-desc.expanded { -webkit-line-clamp: unset; }
.desc-toggle { font-size: 10px; color: #3182ce; cursor: pointer; margin-bottom: 6px; }
.card-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
.card-venue-link { font-size: 11px; color: #2b6cb0; text-decoration: none; border-bottom: 1px dashed #90cdf4; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.card-venue-link:hover { color: #1a4a7a; }
.card-code { font-size: 11px; font-family: monospace; background: #f7fafc; border: 1px solid #e2e8f0; border-radius: 4px; padding: 1px 6px; color: #2d3748; white-space: nowrap; cursor: pointer; }
.card-code:hover { background: #ebf8ff; border-color: #90cdf4; }
.card-code-copied { background: #c6f6d5; border-color: #68d391; color: #276749; }

.interest-rows { display: flex; flex-direction: column; gap: 5px; padding-top: 6px; border-top: 1px solid #edf2f7; margin-top: 6px; }
.interest-row { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
.interest-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; }
.interest-label.in  { color: #38a169; }
.interest-label.out { color: #e53e3e; }
.friend-chip { display: flex; align-items: center; gap: 3px; cursor: pointer; padding: 3px 8px; border-radius: 20px; border: 1.5px solid #e2e8f0; font-size: 11px; font-weight: 500; transition: all .12s; user-select: none; color: #4a5568; }
.friend-chip.in-checked  { color: #fff; border-color: transparent; }
.friend-chip.out-checked { color: #fff; border-color: transparent; }
.chip-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

/* ── Calendar ── */
.cal-day { margin-bottom: 20px; }
.cal-day-header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 8px; padding-bottom: 5px; border-bottom: 2px solid #e2e8f0; }
.cal-day-name { font-size: 16px; font-weight: 800; color: #002633; }
.cal-day-sub { font-size: 12px; color: #718096; }
.cal-rows { display: flex; flex-direction: column; gap: 5px; }
.cal-row { display: flex; align-items: flex-start; gap: 8px; background: #fff; border: 1.5px solid #e2e8f0; border-radius: 7px; padding: 8px 12px; transition: all .12s; }
.cal-row.has-interest  { border-color: #90cdf4; background: #f0faff; }
.cal-row.has-veto      { border-color: #FC8181; background: #fff5f5; }
.cal-row.has-conflict  { border-color: #F6AD55; background: #fffaf0; }
.cal-row:hover { border-color: #bee3f8; box-shadow: 0 1px 6px rgba(0,0,0,.07); }
.cal-icon { font-size: 16px; flex-shrink: 0; padding-top: 1px; }
.cal-body { flex: 1; min-width: 0; }
.cal-top { display: flex; align-items: baseline; gap: 6px; flex-wrap: wrap; margin-bottom: 2px; }
.cal-sport-name { font-size: 12px; font-weight: 700; }
.cal-sport-sub  { font-size: 10px; color: #a0aec0; }
.cal-desc { font-size: 10px; color: #718096; line-height: 1.45; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 4px; word-break: break-word; }
.cal-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.cal-time { font-size: 10px; color: #4a5568; font-weight: 600; white-space: nowrap; }
.cal-venue-link { font-size: 10px; color: #2b6cb0; text-decoration: none; }
.cal-venue-link:hover { text-decoration: underline; }
.cal-code { font-size: 10px; font-family: monospace; color: #4a5568; background: #f7fafc; padding: 1px 5px; border-radius: 3px; border: 1px solid #e2e8f0; cursor: pointer; white-space: nowrap; }
.cal-code:hover { background: #ebf8ff; }
.cal-dots { display: flex; gap: 3px; flex-shrink: 0; align-self: center; }
.cal-dot { width: 9px; height: 9px; border-radius: 50%; cursor: pointer; transition: transform .1s; }
.cal-dot:hover { transform: scale(1.3); }

/* ── Plan table ── */
.stats-bar { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
.stat-pill { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 7px 12px; font-size: 12px; color: #4a5568; }
.stat-pill strong { color: #002633; font-size: 17px; display: block; }
.plan-table { width: 100%; border-collapse: collapse; font-size: 12px; background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
.plan-table th { background: #002633; color: #a0cfe0; font-size: 10px; text-transform: uppercase; letter-spacing: .06em; padding: 9px 12px; text-align: left; font-weight: 600; }
.plan-table td { padding: 9px 12px; border-bottom: 1px solid #f0f4f8; vertical-align: middle; }
.plan-table tr:last-child td { border-bottom: none; }
.plan-table tr:hover td { background: #f7fafc; }
.who-list { display: flex; gap: 3px; flex-wrap: wrap; }
.who-chip { font-size: 10px; padding: 2px 7px; border-radius: 10px; color: #fff; font-weight: 600; }
.copy-btn { background: #edf2f7; border: none; border-radius: 5px; padding: 3px 7px; font-size: 10px; cursor: pointer; color: #4a5568; font-family: monospace; }
.copy-btn:hover { background: #e2e8f0; }
.venue-link { color: #2b6cb0; text-decoration: none; border-bottom: 1px dashed #90cdf4; }
.venue-link:hover { color: #1a4a7a; }

.section-title { font-size: 18px; font-weight: 800; color: #002633; margin-bottom: 3px; }
.section-sub   { font-size: 12px; color: #718096; margin-bottom: 14px; }
.empty { text-align: center; padding: 50px 20px; color: #a0aec0; }
.empty-icon { font-size: 42px; margin-bottom: 10px; }
.empty p { font-size: 14px; }
.sidebar-stat { font-size: 12px; color: #4a5568; display: flex; flex-direction: column; gap: 5px; }
.sidebar-stat-row { display: flex; justify-content: space-between; }
.sidebar-stat-row span:last-child { font-weight: 700; color: #002633; }
</style>
</head>

function fmtTime(t){ if(!t)return ''; const[h,m]=t.split(':'); const hr=parseInt(h); return `${hr>12?hr-12:hr||12}:${m} ${hr>=12?'PM':'AM'}`; }
function randId(){ return Math.random().toString(36).slice(2,8).toUpperCase(); }

// ─── Firebase helpers ────────────────────────────────────────────────────────
let fbApp = null, fbDb = null, fbRoom = null;

function initFirebase(dbUrl, roomId) {
  if (fbApp) try { fbApp.delete(); } catch(e){}
  fbApp = firebase.initializeApp({ databaseURL: dbUrl }, 'la28-' + Date.now());
  fbDb  = firebase.database(fbApp);
  fbRoom = fbDb.ref('rooms/' + roomId);
  return fbRoom;
}

// Firebase <-> React converters
// Firebase doesn't store Sets; we use {key: true} objects
function fbToSet(obj){ return new Set(Object.keys(obj||{}).filter(k=>(obj||{})[k]===true)); }
function fbToMap(obj){
  const m={};
  Object.entries(obj||{}).forEach(([sid,fids])=>{ m[sid]=fbToSet(fids); });
  return m;
}

    // Clean up old listeners
    listenersRef.current.forEach(off => off());
    listenersRef.current = [];

    try {
      const room = initFirebase(clean, rid);

      // Connection state
      const connRef = fbDb.ref('.info/connected');
      const connOff = connRef.on('value', snap => {
        setSyncStatus(snap.val() ? 'connected' : 'disconnected');
      });
      listenersRef.current.push(() => connRef.off('value', connOff));

      // Friends
      const friendsOff = room.child('friends').on('value', snap => {
        const raw = snap.val() || {};

      });
      listenersRef.current.push(() => room.child('friends').off('value', friendsOff));

      // Interests
      const intOff = room.child('interests').on('value', snap => {
        setInterests(fbToMap(snap.val()));
      });
      listenersRef.current.push(() => room.child('interests').off('value', intOff));

      // Vetoes
      const vetOff = room.child('vetoes').on('value', snap => {
        setVetoes(fbToMap(snap.val()));
      });
      listenersRef.current.push(() => room.child('vetoes').off('value', vetOff));

      setRoomId(rid);

          React.createElement('div',{className:'section-title'},'📅 Day-by-Day Schedule'),
          React.createElement('div',{className:'section-sub'},'Colored dots show who\'s in (friend color) or out (red). Click dots to cycle.'),
          React.createElement(FilterBar),
          ALL_DATES.map(date=>{
            const evs=calByDate[date];
            if(!evs||evs.length===0)return null;
            return React.createElement('div',{key:date,className:'cal-day'},
              React.createElement('div',{className:'cal-day-header'},
                React.createElement('span',{className:'cal-day-name'},date+' 2028'),
                React.createElement('span',{className:'cal-day-sub'},evs.length+' session'+(evs.length!==1?'s':''))
              ),
              React.createElement('div',{className:'cal-rows'},evs.map(s=>React.createElement(CalRow,{key:s.id,s})))
            );
          })
        ),

        // PLAN
        tab==='plan'&&React.createElement('div',null,
          React.createElement('div',{className:'section-title'},'📋 Your Group\'s Plan'),
          React.createElement('div',{className:'section-sub'},'Sessions your group has marked. Copy codes to use on LA28.org when tickets open.'),
          planSessions.length===0
            ?React.createElement('div',{className:'empty'},React.createElement('div',{className:'empty-icon'},'📋'),React.createElement('p',null,'Nothing planned yet — browse sessions and mark who\'s interested!'))
            :React.createElement('div',null,
              React.createElement('div',{className:'stats-bar'},
                React.createElement('div',{className:'stat-pill'},React.createElement('strong',null,planSessions.filter(s=>hasAnyInterest(s.id)).length),'Sessions marked In'),
                React.createElement('div',{className:'stat-pill'},React.createElement('strong',null,planSessions.filter(s=>hasAnyVeto(s.id)&&hasAnyInterest(s.id)).length),'⚠️ Conflicts'),
                React.createElement('div',{className:'stat-pill'},React.createElement('strong',null,planSessions.filter(s=>s.type==='Final'&&hasAnyInterest(s.id)).length),'Finals'),
                ...friends.map(f=>React.createElement('div',{key:f.id,className:'stat-pill'},
                  React.createElement('strong',{style:{color:f.color}},`✓${friendCounts[f.id]?.in||0} ✗${friendCounts[f.id]?.out||0}`),f.name
                ))
              ),
              React.createElement('table',{className:'plan-table'},
                React.createElement('thead',null,
                  React.createElement('tr',null,
                    ['Sport','Date','Time (PT)','Venue','Type','Session Code','✓ Going','✗ Not Going'].map(h=>
                      React.createElement('th',{key:h},h)
                    )
                  )
                ),
                React.createElement('tbody',null,
                  planSessions.map(s=>{
                    const conflict=hasAnyInterest(s.id)&&hasAnyVeto(s.id);
                    const vetoOnly=!hasAnyInterest(s.id)&&hasAnyVeto(s.id);
                    const rowStyle=conflict?{background:'#fffaf0'}:vetoOnly?{background:'#fff5f5'}:{};
                    return React.createElement('tr',{key:s.id,style:rowStyle},
                      React.createElement('td',null,conflict&&React.createElement('span',{title:'Conflict',style:{marginRight:4}},'⚠️'),React.createElement('strong',null,(SPORT_ICONS[s.sport]||'🏅')+' '+s.sport)),
                      React.createElement('td',null,s.weekday+', '+s.shortDate),
                      React.createElement('td',null,s.start?fmtTime(s.start)+(s.end?' – '+fmtTime(s.end):''):'—'),
                      React.createElement('td',null,React.createElement('a',{href:mapsUrl(s.venue),target:'_blank',rel:'noopener noreferrer',className:'venue-link',style:{fontSize:11}},s.venue)),
                      React.createElement('td',null,React.createElement(TypeBadge,{type:s.type})),
                      React.createElement('td',null,React.createElement('button',{className:'copy-btn',onClick:()=>copyCode(s.code)},copiedCode===s.code?'✓ Copied!':s.code+' 📋')),
                      React.createElement('td',null,React.createElement('div',{className:'who-list'},friends.filter(f=>isInterested(s.id,f.id)).map(f=>React.createElement('span',{key:f.id,className:'who-chip',style:{background:f.color}},f.name)))),
                      React.createElement('td',null,React.createElement('div',{className:'who-list'},friends.filter(f=>isVetoed(s.id,f.id)).map(f=>React.createElement('span',{key:f.id,className:'who-chip',style:{background:'#E53E3E'}},f.name))))
                    );
                  })
                )
              )
            )
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(React.createElement(App));
</script>
